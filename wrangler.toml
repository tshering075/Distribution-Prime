# Cloudflare Workers — static React app (Option B).
# Deploy: npm run build && npx wrangler deploy
# Or: npm run deploy:cf

name = "cokesales-management-system"
compatibility_date = "2025-04-01"

[assets]
directory = "./build"
# Serve *.html at their real paths (200). Default "auto" 308-strips .html and breaks Google OAuth privacy URL checks.
html_handling = "none"
not_found_handling = "single-page-application"

[build]
  command = "npm run build"
  publish = "build"

# Static legal pages must not fall through to the React shell (OAuth / Google verification).
[[redirects]]
  from = "/privacy-policy"
  to = "/legal/privacy-policy.html"
  status = 200

[[redirects]]
  from = "/privacy-policy.html"
  to = "/legal/privacy-policy.html"
  status = 200

[[redirects]]
  from = "/terms-of-service"
  to = "/legal/terms-of-service.html"
  status = 200

[[redirects]]
  from = "/terms-of-service.html"
  to = "/legal/terms-of-service.html"
  status = 200

[[redirects]]
  from = "/legal/*"
  to = "/legal/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

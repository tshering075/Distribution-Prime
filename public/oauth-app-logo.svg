<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">CokeSales Management System</title>
  <desc id="logoDesc">Hexagonal CS mark with growth arrow — CokeSales Management System.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#400000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="120" height="120" rx="22" fill="#E40521"/>

  <!-- Emblem (matches reference layout) -->
  <g transform="translate(60, 36)" filter="url(#shadow)">
    <!-- Yellow S + right hex edge -->
    <path
      fill="#FFC72C"
      d="M 6 -24
         L 28 -24
         L 28 -4
         C 28 10, 14 14, 2 14
         C -10 14, -10 28, 4 28
         L 24 28
         L 24 32
         L 30 32
         L 30 6
         C 30 -12, 18 -18, 6 -18
         Z"
    />
    <!-- White C frame (left hex + inner edge) -->
    <path
      fill="#FFFFFF"
      d="M -30 -17
         L -10 -17
         L -10 -7
         L -22 -7
         L -22 7
         L -10 7
         L -10 17
         L -30 17
         L -30 7
         L -18 7
         L -18 -7
         L -30 -7
         Z"
    />
    <!-- Red inner C (channel) -->
    <path
      fill="#E40521"
      d="M -26 -13
         L -14 -13
         L -14 -3
         L -22 -3
         L -22 3
         L -14 3
         L -14 13
         L -26 13
         L -26 3
         L -18 3
         L -18 -3
         L -26 -3
         Z"
    />
    <!-- Growth arrow (white) -->
    <path
      fill="#FFFFFF"
      d="M 18 -30 L 30 -18 L 24 -18 L 24 -8 L 12 -8 L 12 -18 L 6 -18 Z"
    />
  </g>

  <!-- Wordmark -->
  <text x="60" y="78" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="-0.3">
    <tspan fill="#FFFFFF">Coke</tspan><tspan fill="#FFC72C">Sales</tspan>
  </text>
  <text
    x="60"
    y="92"
    text-anchor="middle"
    fill="#FFFFFF"
    font-family="Segoe UI, Arial, sans-serif"
    font-size="5.5"
    font-weight="600"
    letter-spacing="2.8"
  >MANAGEMENT SYSTEM</text>
</svg>

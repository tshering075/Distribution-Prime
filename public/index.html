<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/coke-sales-icon-512.png" type="image/png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#E40521" />
    <meta name="description" content="CokeSales Management System — distributor sales tracking, targets, orders, and optional Gmail-based order approvals. Operated by Tashi Beverages Ltd." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="CokeSales" />
    <!-- Google Search Console: add URL-prefix property https://cokesales-management-system.pages.dev/ and paste the meta tag below. -->
    <meta name="google-site-verification" content="DIdPOeUQ1nVZfMtDBpMv7Pso5S0h2n8i8breS8tUDSQ" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/coke-sales-icon-512.png" />
    <!-- All icons generated from the same master logo via scripts/resize-brand-logos.ps1 -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>CokeSales Management System</title>
    <style>
      #splash-screen {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #fff 0%, #f5f8fc 50%, #fff 100%);
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      #splash-screen.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #splash-screen img {
        width: 200px;
        height: 200px;
        image-rendering: auto;
        animation: splashPulse 1.5s ease-in-out infinite;
      }
      #splash-screen .splash-loader {
        margin-top: 32px;
        width: 40px;
        height: 40px;
        border: 4px solid #f3f3f3;
        border-top: 4px solid #0d47a1;
        border-radius: 50%;
        animation: splashSpin 0.8s linear infinite;
      }
      #oauth-home-fallback {
        max-width: 720px;
        margin: 0 auto;
        padding: 32px 20px 48px;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        line-height: 1.6;
        color: #1a1a1a;
      }
      #oauth-home-fallback h1 { font-size: 1.75rem; margin: 0 0 0.5rem; color: #0d47a1; }
      #oauth-home-fallback .operator { color: #555; margin-bottom: 1.25rem; }
      #oauth-home-fallback a { color: #0d47a1; }
      #oauth-home-fallback img { width: 72px; height: 72px; vertical-align: middle; margin-right: 12px; }
      @keyframes splashPulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      @keyframes splashSpin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <noscript>
      <main id="oauth-home-fallback">
        <p><img src="%PUBLIC_URL%/coke-sales-icon-512.png" alt="" width="72" height="72" /></p>
        <h1>CokeSales Management System</h1>
        <p class="operator">Operated by <strong>Tashi Beverages Ltd</strong></p>
        <p>
          Web application for beverage distribution teams: distributor targets and achievements,
          order workflow, product rates, stock lifting, and optional Gmail-based order approval emails
          for authorized administrators.
        </p>
        <p>
          <a href="%PUBLIC_URL%/login">Sign in</a>
          &middot;
          <a href="%PUBLIC_URL%/privacy-policy">Privacy Policy</a>
          &middot;
          <a href="%PUBLIC_URL%/terms-of-service">Terms of Service</a>
        </p>
        <p>Contact: <a href="mailto:tsheringtamang@bhutancoke.com">tsheringtamang@bhutancoke.com</a></p>
      </main>
    </noscript>
    <div id="splash-screen">
      <img src="%PUBLIC_URL%/coke-sales-icon-512.png" alt="CokeSales Management System" width="200" height="200" />
      <div class="splash-loader"></div>
    </div>
    <div id="root"></div>
  </body>
</html>

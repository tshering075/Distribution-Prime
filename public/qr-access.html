<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan QR Code to Access App</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        #qrcode {
            margin: 20px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
        }
        .url {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
            color: #333;
            word-break: break-all;
            font-family: monospace;
        }
        .instructions {
            margin-top: 20px;
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }
        .warning {
            margin-top: 15px;
            padding: 10px;
            background: #fff3cd;
            color: #856404;
            border-radius: 5px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Scan to Access App</h1>
        <div id="qrcode"></div>
        <div class="url" id="url"></div>
        <div class="instructions">
            <p><strong>Instructions:</strong></p>
            <ol style="text-align: left; margin: 10px 0;">
                <li>Make sure your phone and computer are on the same WiFi network</li>
                <li>Scan the QR code with your phone's camera</li>
                <li>Or manually enter the URL shown above</li>
            </ol>
        </div>
        <div class="warning">
            ⚠️ Make sure the development server is running (npm start)
        </div>
    </div>

    <script>
        // Get current hostname and port
        const hostname = window.location.hostname;
        const port = window.location.port || '3000';
        const url = `http://${hostname}:${port}`;
        
        // Update URL display
        document.getElementById('url').textContent = url;
        
        // Generate QR code
        QRCode.toCanvas(document.createElement('canvas'), url, {
            width: 300,
            margin: 2,
            color: {
                dark: '#000000',
                light: '#FFFFFF'
            }
        }, function (error, canvas) {
            if (error) {
                console.error(error);
                document.getElementById('qrcode').innerHTML = '<p>Error generating QR code</p>';
            } else {
                document.getElementById('qrcode').appendChild(canvas);
            }
        });
    </script>
</body>
</html>
